# Woodpecker CI configuration file for Docusaurus blog

pipeline:
  deps:
    image: node:20-alpine
    commands:
      - npm install -g pnpm --registry https://registry.npmmirror.com
      - pnpm install -registry https://registry.npmmirror.com --frozen-lockfile
    cache: # 缓存依赖，加速后续构建（关键优化）
      mount:
        - node_modules
        - .pnpm-store

  build:
    image: node:20-alpine
    commands:
      - npm install -g pnpm
      - pnpm run build
      - ls -l build/
    depends_on: [deps]

  deploy:
    image: alpine:latest
    commands:
      # 清空目标目录 → 复制构建产物 → 验证
      - mkdir -p /nas-web/my-blog
      - rm -rf /nas-web/my-blog/*
      - cp -r build/* /nas-web/my-blog/
      - echo "部署完成，目标目录文件列表："
      - ls -l /nas-web/my-blog/
    volumes:
      - /volume1/web:/nas-web
    when:
      branch: main
      status: success  # 仅构建成功后部署
    depends_on: [build]

# 限制仅main分支触发（全局配置）
branches: main